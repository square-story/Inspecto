name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Authenticate Railway CLI
        run: |
          mkdir -p ~/.railway
          echo '{"user":{"token":"${{ secrets.RAILWAY_TOKEN }}","accessToken":null,"refreshToken":null,"tokenExpiresAt":0},"projects":{}}' > ~/.railway/config.json

      - name: Deploy to Railway
        working-directory: ./backend
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --environment production --detach -m "Deploy from GitHub Actions (${{ github.sha }})"
